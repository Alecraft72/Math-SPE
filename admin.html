<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Maths Spé</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c12;--surface:#13131c;--surface2:#1a1a27;--border:rgba(255,255,255,0.07);--text:#ede9e1;--muted:#777;--c1:#e63946;--c3:#2a9d8f;--c4:#4895ef;--c8:#ffd166}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:340px;text-align:center}
.login-logo{font-size:36px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.login-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:20px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--c4)}
.login-btn{width:100%;background:var(--c1);border:none;border-radius:12px;color:#fff;padding:13px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700}
.login-error{font-size:12px;color:var(--c1);margin-top:10px;min-height:18px;font-weight:600}

/* APP */
#app{display:none;max-width:900px;margin:0 auto;padding:24px 16px 60px}

/* HEADER */
.adm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.adm-title{font-size:22px;font-weight:800}
.adm-title span{color:var(--c1)}
.btn-logout{background:transparent;border:1px solid #333;border-radius:8px;color:#666;padding:7px 14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px}
.btn-refresh{background:var(--c4);border:none;border-radius:8px;color:#fff;padding:7px 16px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700}

/* STATS CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center}
.stat-num{font-size:32px;font-weight:800;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s}
.tab-btn.active{background:var(--c1);border-color:var(--c1);color:#fff}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 36px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none}
.search-wrap::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:12px}

/* TABLES */
.code-table{width:100%;border-collapse:collapse;font-size:13px}
.code-table th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.code-table td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.03);font-family:'JetBrains Mono',monospace}
.code-table tr:hover td{background:rgba(255,255,255,0.02)}
.badge-used{background:rgba(230,57,70,.15);color:var(--c1);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif}
.badge-free{background:rgba(42,157,143,.15);color:var(--c3);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif}

/* COPY BTN */
.btn-copy{background:rgba(72,149,239,.15);border:1px solid var(--c4);border-radius:6px;color:var(--c4);padding:3px 10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600}
.btn-copy:active{opacity:.7}

/* PAGINATION */
.pagination{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.page-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px}
.page-btn.active{background:var(--c1);border-color:var(--c1);color:#fff}

.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
</style>
</head>
<body>


<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">👑</div>
    <div class="login-title">Page Admin</div>
    <div class="login-sub">Entre le code administrateur</div>
    <input class="login-input" id="code-input" type="tel" inputmode="numeric" maxlength="6"
      placeholder="······" autocomplete="off" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Accéder →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="adm-header">
    <div class="adm-title">Admin <span>Maths Spé</span></div>
    <div style="display:flex;gap:8px">
      <button class="btn-refresh" onclick="loadData()">↺ Actualiser</button>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="stat-total" style="color:var(--c4)">—</div>
      <div class="stat-label">Codes total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-used" style="color:var(--c1)">—</div>
      <div class="stat-label">Utilisés</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-free" style="color:var(--c3)">—</div>
      <div class="stat-label">Disponibles</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-pct" style="color:var(--c8)">—</div>
      <div class="stat-label">% utilisé</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showSection('available',this)">✅ Disponibles</button>
    <button class="tab-btn" onclick="showSection('used',this)">❌ Utilisés</button>
  </div>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="Rechercher un code…" oninput="filterCodes(this.value)">
  </div>

  <div id="section-available">
    <div id="available-list"></div>
    <div class="pagination" id="pages-available"></div>
  </div>

  <div id="section-used" style="display:none">
    <div id="used-list"></div>
  </div>
</div>

let usedCodes = {};
let currentSection = 'available';
let currentPage = 1;
const PAGE_SIZE = 100;
let filteredAvailable = [];
let searchQuery = '';

// LOGIN
function tryLogin() {
  const code = document.getElementById('code-input').value.trim();
  if(code !== ADMIN_CODE) {
    document.getElementById('login-error').textContent = 'Code admin incorrect.';
    document.getElementById('code-input').style.borderColor = 'var(--c1)';
    setTimeout(()=>{ document.getElementById('code-input').style.borderColor=''; }, 800);
    return;
  }
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('code-input').value = '';
}

// FIREBASE
async function loadData() {
  document.getElementById('available-list').innerHTML = '<div class="loading">⏳ Chargement…</div>';
  try {
    const r = await fetch(FB_URL + '/codes.json');
    usedCodes = (await r.json()) || {};
  } catch(e) {
    usedCodes = {};
  }
  renderStats();
  renderSection();
}

function renderStats() {
  const total = ALL_CODES_LIST.length;
  const used = Object.keys(usedCodes).length;
  const free = total - used;
  const pct = Math.round(used/total*100);
  document.getElementById('stat-total').textContent = total.toLocaleString('fr');
  document.getElementById('stat-used').textContent = used.toLocaleString('fr');
  document.getElementById('stat-free').textContent = free.toLocaleString('fr');
  document.getElementById('stat-pct').textContent = pct + '%';
}

function filterCodes(q) {
  searchQuery = q.trim();
  currentPage = 1;
  renderSection();
}

function showSection(name, btn) {
  currentSection = name;
  currentPage = 1;
  searchQuery = '';
  document.getElementById('search').value = '';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-available').style.display = name==='available' ? '' : 'none';
  document.getElementById('section-used').style.display = name==='used' ? '' : 'none';
  renderSection();
}

function renderSection() {
  if(currentSection === 'available') renderAvailable();
  else renderUsed();
}

function renderAvailable() {
  const available = ALL_CODES_LIST.filter(c => !usedCodes[c]);
  filteredAvailable = searchQuery ? available.filter(c=>c.includes(searchQuery)) : available;

  const total = filteredAvailable.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage-1)*PAGE_SIZE;
  const slice = filteredAvailable.slice(start, start+PAGE_SIZE);

  if(!slice.length) {
    document.getElementById('available-list').innerHTML = '<div class="empty">Aucun code disponible</div>';
    document.getElementById('pages-available').innerHTML = '';
    return;
  }

  let html = `<table class="code-table">
    <thead><tr><th>Code</th><th>Statut</th><th>Action</th></tr></thead><tbody>`;
  slice.forEach(c => {
    html += `<tr>
      <td>${c}</td>
      <td><span class="badge-free">Disponible</span></td>
      <td><button class="btn-copy" onclick="copyCode('${c}')">Copier</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  html += `<div style="font-size:11px;color:var(--muted);margin-top:10px">${total.toLocaleString('fr')} codes disponibles</div>`;

  document.getElementById('available-list').innerHTML = html;
  renderPagination(totalPages);
}

function renderUsed() {
  const entries = Object.entries(usedCodes);
  const filtered = searchQuery ? entries.filter(([c])=>c.includes(searchQuery)) : entries;

  if(!filtered.length) {
    document.getElementById('used-list').innerHTML = '<div class="empty">Aucun code utilisé</div>';
    return;
  }

  let html = `<table class="code-table">
    <thead><tr><th>Code</th><th>Statut</th></tr></thead><tbody>`;
  filtered.forEach(([c, bid]) => {
    html += `<tr>
      <td>${c}</td>
      <td><span class="badge-used">Utilisé</span></td>
    </tr>`;
  });
  html += '</tbody></table>';
  html += `<div style="font-size:11px;color:var(--muted);margin-top:10px">${filtered.length.toLocaleString('fr')} codes utilisés</div>`;

  document.getElementById('used-list').innerHTML = html;
}

function renderPagination(totalPages) {
  if(totalPages <= 1) { document.getElementById('pages-available').innerHTML=''; return; }
  let html = '';
  const start = Math.max(1, currentPage-2);
  const end = Math.min(totalPages, currentPage+2);
  if(start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
  if(start > 2) html += `<span style="color:var(--muted);padding:6px">…</span>`;
  for(let i=start;i<=end;i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if(end < totalPages-1) html += `<span style="color:var(--muted);padding:6px">…</span>`;
  if(end < totalPages) html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  document.getElementById('pages-available').innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderAvailable();
  window.scrollTo(0,0);
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(()=>{
    // Feedback visuel
    event.target.textContent = '✓ Copié';
    event.target.style.background = 'rgba(42,157,143,.2)';
    event.target.style.borderColor = 'var(--c3)';
    event.target.style.color = 'var(--c3)';
    setTimeout(()=>{
      event.target.textContent = 'Copier';
      event.target.style.background = '';
      event.target.style.borderColor = '';
      event.target.style.color = '';
    }, 1500);
  });
}

document.getElementById('code-input').addEventListener('input', function() {
  const v = this.value.replace(/[^0-9]/g,'').slice(0,6);
  this.value = v;
  document.getElementById('login-error').textContent = '';
  if(v.length === 6) tryLogin();
});

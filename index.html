<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathématiques</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c12;--surface:#13131c;--surface2:#1a1a27;--border:rgba(255,255,255,0.07);--text:#ede9e1;--muted:#777;--c1:#e63946;--c2:#f4a261;--c3:#2a9d8f;--c4:#4895ef;--c5:#9b5de5;--c6:#f72585;--c7:#06d6a0;--c8:#ffd166;--c9:#ef476f;--c10:#118ab2}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:42px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:22px;text-align:center;letter-spacing:6px;outline:none;transition:border-color .2s;margin-bottom:14px}
.login-input:focus{border-color:var(--c4)}
.login-btn{width:100%;background:var(--c1);border:none;border-radius:12px;color:#fff;padding:14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-error{font-size:13px;color:var(--c1);margin-top:12px;min-height:20px;font-weight:600}
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.dot{width:11px;height:11px;border-radius:50%;background:var(--border);transition:background .15s}
.dot.on{background:var(--c4)}
#app{display:none}
header{background:linear-gradient(135deg,#0d0d1a,#0a1628,#0d0d1a);border-bottom:2px solid var(--c1);padding:22px 20px 0;position:sticky;top:0;z-index:300}
.hdr-top{max-width:900px;margin:0 auto}
.hdr-label{font-size:10px;letter-spacing:5px;color:var(--c1);margin-bottom:5px;text-transform:uppercase;font-weight:600}
.hdr-title{font-size:clamp(17px,3.5vw,24px);font-weight:800}
.hdr-prog{font-size:11px;color:var(--muted);margin-top:3px}
.hdr-user{font-size:11px;color:var(--c3);margin-top:2px;font-weight:600}
nav{display:flex;gap:4px;margin-top:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav::-webkit-scrollbar{display:none}
nav button{padding:8px 16px;border-radius:16px 16px 0 0;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;transition:all .2s;background:rgba(255,255,255,0.04);color:#777;white-space:nowrap;flex-shrink:0}
nav button.active{background:var(--c1);color:#fff}
.tab{display:none;max-width:900px;margin:0 auto;padding:20px 14px 80px}
.tab.active{display:block}
.section-intro{font-size:12px;color:var(--muted);margin-bottom:16px;margin-top:4px}
.chapter{margin-bottom:10px;border-radius:14px;overflow:hidden}
.chapter-btn{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .25s;color:var(--text);font-family:'Outfit',sans-serif}
.chapter-btn.open{border-radius:14px 14px 0 0}
.icon-box{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900}
.ch-meta{flex:1;min-width:0}
.ch-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-tag{font-size:10px;color:var(--muted);margin-top:2px}
.chevron{font-size:16px;transition:transform .22s;flex-shrink:0}
.chapter-btn.open .chevron{transform:rotate(90deg)}
.chapter-body{display:none;background:rgba(255,255,255,0.015);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:6px 10px 10px}
.chapter-body.open{display:block}
.sec{margin-top:7px}
.sec-btn{width:100%;text-align:left;background:transparent;border:1px solid rgba(255,255,255,0.05);border-radius:8px;padding:9px 13px;cursor:pointer;color:#bbb;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.sec-badge{font-size:10px;color:#444;font-weight:400}
.sec-content{display:none;background:var(--bg);padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;color:#ccc5b8;white-space:pre-wrap;border-radius:0 0 8px 8px;border:1px solid;border-top:none;border-left-width:3px}
.sec-content.open{display:block}
.search-wrap{position:relative;margin-bottom:16px;margin-top:4px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none}
.search-wrap::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px}
.fc-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.fc-stats{font-size:12px;color:var(--muted)}
.btn-reset{background:transparent;border:1px solid #333;border-radius:8px;color:#666;padding:6px 14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px}
#fc-area{text-align:center}
#fc-prog-wrap{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:14px;overflow:hidden}
#fc-prog-bar{height:100%;background:linear-gradient(90deg,var(--c3),var(--c4));border-radius:2px;transition:width .3s}
#fc-progress{font-size:11px;color:#444;margin-bottom:8px}
#fc-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:2px solid var(--c1);border-radius:20px;padding:44px 26px;cursor:pointer;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;margin-bottom:18px;user-select:none;position:relative}
#fc-card.flipped{background:linear-gradient(135deg,#112a20,#0a1f17);border-color:var(--c3)}
#fc-card-cat{position:absolute;top:12px;right:14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.5;font-weight:600}
#fc-card-side{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;color:var(--c1);font-weight:700}
#fc-card.flipped #fc-card-side{color:var(--c3)}
#fc-card-text{font-size:17px;font-weight:700;text-align:center;max-width:340px}
#fc-card.flipped #fc-card-text{font-family:'JetBrains Mono',monospace;font-size:22px}
#fc-card-hint{font-size:11px;color:#333;margin-top:16px}
#fc-actions{display:none;gap:10px;justify-content:center}
#fc-actions.show{display:flex}
.btn-know,.btn-dont{flex:1;max-width:190px;padding:13px;border-radius:12px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;border:2px solid}
.btn-know{background:rgba(42,157,143,.12);border-color:var(--c3);color:var(--c3)}
.btn-dont{background:rgba(230,57,70,.12);border-color:var(--c1);color:var(--c1)}
#fc-done{display:none;text-align:center;padding:50px 20px}
#fc-done.show{display:block}
.done-emoji{font-size:50px;margin-bottom:14px}
.done-title{font-size:21px;font-weight:800;color:var(--c3);margin-bottom:8px}
.done-sub{color:var(--muted);margin-bottom:24px;font-size:14px}
.btn-restart{background:var(--c1);border:none;border-radius:12px;color:#fff;padding:13px 30px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700}
.recap-grid{display:grid;gap:14px}
.recap-block{border-radius:12px;overflow:hidden}
.recap-head{padding:11px 16px;font-weight:700;font-size:13px}
.recap-tbl{width:100%;border-collapse:collapse}
.recap-tbl td{padding:8px 13px;font-family:'JetBrains Mono',monospace;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.04)}
.recap-tbl td:last-child{border-right:none}
.recap-tbl tr:last-child td{border-bottom:none}
.recap-tbl tr.hdr td{font-family:'Outfit',sans-serif;font-weight:700;font-size:11px;color:#aaa;background:rgba(255,255,255,0.05)}
.recap-tbl tr.even td{background:rgba(255,255,255,0.02)}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:rgba(255,255,255,0.06);
  --text:#ede9df;--muted:#666;--faint:#222;
  --red:#e63946;--orange:#f4a261;--teal:#2a9d8f;--blue:#4895ef;
  --purple:#9b5de5;--pink:#f72585;--green:#06d6a0;--yellow:#ffd166;
  --red2:#ef476f;--navy:#118ab2;
}

/* ── FRACTIONS MATHÉMATIQUES ── */
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;line-height:1.15}
.frac .num{border-bottom:1.5px solid currentColor;padding-bottom:2px;text-align:center;white-space:nowrap}
.frac .den{padding-top:2px;text-align:center;white-space:nowrap}

body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
/* ── NAVIGATION TABS ── */
.nav-bar{background:linear-gradient(135deg,#0d0d1a,#0a1628,#0d0d1a);border-bottom:2px solid var(--red);padding:16px 20px 0;position:sticky;top:0;z-index:300}
.nav-inner{max-width:900px;margin:0 auto;display:flex;gap:4px;overflow-x:auto}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{padding:8px 18px;border-radius:16px 16px 0 0;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all .2s;background:rgba(255,255,255,0.04);color:#777;white-space:nowrap;flex-shrink:0}
.nav-btn.active{background:var(--red);color:#fff}
.tab-section{display:none}.tab-section.active{display:block}

/* ── FLASHCARDS ── */
.fc-wrap{max-width:900px;margin:0 auto;padding:24px 16px 80px}
.fc-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.fc-stats{font-size:12px;color:var(--muted)}
.fc-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fc-filter{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;transition:all .15s}
.fc-filter.on{opacity:1}.fc-filter.off{opacity:.35}
.btn-reset{background:transparent;border:1px solid #333;border-radius:8px;color:#666;padding:6px 14px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px}
#fc-prog-wrap{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:12px;overflow:hidden}
#fc-prog-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:2px;transition:width .3s}
#fc-progress{font-size:11px;color:#444;margin-bottom:10px;text-align:center}
#fc-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:2px solid var(--red);border-radius:20px;padding:44px 26px;cursor:pointer;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;margin-bottom:18px;user-select:none;position:relative}
#fc-card.flipped{background:linear-gradient(135deg,#112a20,#0a1f17);border-color:var(--teal)}
#fc-cat{position:absolute;top:12px;right:14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.45;font-weight:600}
#fc-side{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;color:var(--red);font-weight:700}
#fc-card.flipped #fc-side{color:var(--teal)}
#fc-text{font-size:17px;font-weight:700;text-align:center;max-width:380px}
#fc-card.flipped #fc-text{font-family:'JetBrains Mono',monospace;font-size:20px}
#fc-hint{font-size:11px;color:#333;margin-top:16px}
#fc-actions{display:none;gap:10px;justify-content:center}
#fc-actions.show{display:flex}
.btn-know,.btn-dont{flex:1;max-width:190px;padding:13px;border-radius:12px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;border:2px solid}
.btn-know{background:rgba(42,157,143,.12);border-color:var(--teal);color:var(--teal)}
.btn-dont{background:rgba(230,57,70,.12);border-color:var(--red);color:var(--red)}
#fc-done{display:none;text-align:center;padding:50px 20px}
#fc-done.show{display:block}
.done-emoji{font-size:50px;margin-bottom:14px}
.done-title{font-size:21px;font-weight:800;color:var(--teal);margin-bottom:8px}
.done-sub{color:var(--muted);margin-bottom:24px;font-size:14px}
.btn-restart{background:var(--red);border:none;border-radius:12px;color:#fff;padding:13px 30px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700}

/* ── FORMULES ── */
.recap-wrap{max-width:900px;margin:0 auto;padding:24px 16px 80px}
.recap-grid{display:grid;gap:16px}
.recap-block{border-radius:14px;overflow:hidden}
.recap-head{padding:12px 18px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.recap-tbl{width:100%;border-collapse:collapse;background:#ffffff}
.recap-tbl td{padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#111118;border-bottom:1px solid #e8e8ee;border-right:1px solid #e8e8ee}
.recap-tbl td:last-child{border-right:none}
.recap-tbl tr:last-child td{border-bottom:none}
.recap-tbl tr.hdr td{font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;color:#111118;background:#f0f0f5;letter-spacing:.5px}
.recap-tbl tr.even td{background:#f8f8fc;color:#111118}


/* HEADER */
.hero{
  background:linear-gradient(160deg,#0a0a0f 0%,#0f0f1a 40%,#0a1020 100%);
  border-bottom:1px solid var(--border);padding:48px 24px 40px;text-align:center;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 600px 300px at 50% 0%,rgba(72,149,239,0.06),transparent);
}
.hero-badge{
  display:inline-block;font-size:10px;letter-spacing:5px;text-transform:uppercase;
  color:var(--blue);border:1px solid rgba(72,149,239,0.3);border-radius:20px;
  padding:5px 16px;margin-bottom:20px;font-weight:600;
}
.hero h1{
  font-family:'Libre Baskerville',serif;font-size:clamp(24px,5vw,42px);
  font-weight:700;letter-spacing:-1px;margin-bottom:8px;
  background:linear-gradient(135deg,#ede9df,#aaa8a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:8px;max-width:900px;margin:0 auto;
}
.toc-item{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;text-align:left;display:flex;align-items:center;gap:8px;
}
.toc-item:hover{background:var(--surface2)}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:32px 16px 80px}

/* CHAPTER */
.chapter{margin-bottom:48px}
.ch-header{
  display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;
  padding-bottom:16px;border-bottom:1px solid var(--border);
}
.ch-icon{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;
}
.ch-title{font-family:'Libre Baskerville',serif;font-size:24px;font-weight:700;margin-bottom:4px}
.ch-desc{font-size:12px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}

/* SECTIONS */
.sections{display:flex;flex-direction:column;gap:12px}
.section{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;transition:border-color .2s;
}
.section:hover{border-color:rgba(255,255,255,0.12)}
.sec-header{
  padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;user-select:none;
}
.sec-title{font-weight:700;font-size:13px}
.sec-tag{font-size:10px;color:var(--muted);font-weight:400}
.sec-body{
  display:none;padding:0 18px 16px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  line-height:1.95;color:#ccc5b5;white-space:pre-wrap;
  border-top:1px solid var(--border);padding-top:14px;
}
.sec-body.open{display:block}
.section.active .sec-header{background:var(--surface2)}

/* DEFINITION BOX */
.def-box{
  background:rgba(72,149,239,0.06);border:1px solid rgba(72,149,239,0.2);
  border-left:3px solid var(--blue);border-radius:0 8px 8px 0;
  padding:12px 16px;margin:8px 0;font-size:12px;line-height:1.8;
  font-family:'JetBrains Mono',monospace;color:#ccc5b5;white-space:pre-wrap;
}
.prop-box{
  background:rgba(42,157,143,0.06);border:1px solid rgba(42,157,143,0.2);
  border-left:3px solid var(--teal);border-radius:0 8px 8px 0;
  padding:12px 16px;margin:8px 0;font-size:12px;line-height:1.8;
  font-family:'JetBrains Mono',monospace;color:#ccc5b5;white-space:pre-wrap;
}
.warn-box{
  background:rgba(255,209,102,0.06);border:1px solid rgba(255,209,102,0.2);
  border-left:3px solid var(--yellow);border-radius:0 8px 8px 0;
  padding:12px 16px;margin:8px 0;font-size:12px;line-height:1.8;
  font-family:'JetBrains Mono',monospace;color:#ccc5b5;white-space:pre-wrap;
}
.method-box{
  background:rgba(246,162,97,0.06);border:1px solid rgba(246,162,97,0.2);
  border-left:3px solid var(--orange);border-radius:0 8px 8px 0;
  padding:12px 16px;margin:8px 0;font-size:12px;line-height:1.8;
  font-family:'JetBrains Mono',monospace;color:#ccc5b5;white-space:pre-wrap;
}

/* TABLE */
.formula-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.formula-table th{
  background:rgba(255,255,255,0.06);padding:8px 12px;
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;
  color:#aaa;text-align:left;letter-spacing:.5px;border-bottom:1px solid var(--border);
}
.formula-table td{
  padding:8px 12px;font-family:'JetBrains Mono',monospace;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.formula-table tr:last-child td{border-bottom:none}
.formula-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}

/* LABEL */
.label{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:8px;
  font-family:'Outfit',sans-serif;
}

</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📐</div>
    <div class="login-title">Maths Spé — 1ère</div>
    <div class="login-sub">Entre ton code d'accès à 6 chiffres</div>
    <div class="dots" id="dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div><div class="dot" id="d4"></div><div class="dot" id="d5"></div>
    </div>
    <input class="login-input" id="code-input" type="tel" inputmode="numeric" maxlength="6"
      placeholder="······" autocomplete="off" oninput="handleInput(this.value)" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Accéder →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
</head>
<body>

<div class="hero">
  <div class="hero-badge">Programme 2019 · Spécialité</div>
  <h1>Mathématiques — Première</h1>
  <p class="hero-sub">Fiches de révision complètes · Cours Yvan Monka</p>
  <div class="toc-grid" id="toc"></div>
</div>

<div class="nav-bar">
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showTab('fiches',this)">📚 Fiches</button>
    <button class="nav-btn" onclick="showTab('flash',this)">🃏 Flashcards</button>
    <button class="nav-btn" onclick="showTab('recap',this)">📊 Formules clés</button>

function sendTelegram(msg) {
  fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {

function getBrowserId() {
  let id = localStorage.getItem('_bid');
  if (!id) {
    id = Math.random().toString(36).substr(2,9) + Date.now().toString(36);
    localStorage.setItem('_bid', id);
  }
  return id;
}

window.addEventListener('load', () => {
  history.replaceState(null, '', location.pathname);
  window.addEventListener('popstate', () => history.pushState(null, '', location.pathname));
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && (ALL_CODES.has(saved.code) || TEST_CODES.has(saved.code) || ADMIN_CODES.has(saved.code))) {
      launchApp(saved.code, false);
      return;
    }
  } catch(e) {}
});

function handleInput(val) {
  const v = val.replace(/[^0-9]/g,'').slice(0,6);
  document.getElementById('code-input').value = v;
  for(let i=0;i<6;i++) document.getElementById('d'+i).classList.toggle('on', i < v.length);
  document.getElementById('login-error').textContent = '';
  if(v.length === 6) tryLogin();
}

function tryLogin() {
  const code = document.getElementById('code-input').value.trim();
  if(!code || code.length < 6) { showErr('Entre un code à 6 chiffres.'); return; }

  // ── ADMIN : accès illimité, pas de liaison appareil ──
  if(ADMIN_CODES.has(code)) {
    const now = new Date().toLocaleString('fr-FR', {timeZone:'Europe/Paris'});
    sendTelegram(`👑 Connexion ADMIN\nCode: <code>${code}</code>\nDate: ${now}`);
    launchApp(code, false, true);
    return;
  }

  // ── Vérifier code valide (normal ou test) ──
  const valid = ALL_CODES.has(code) || TEST_CODES.has(code);
  if(!valid) { showErr('Code incorrect ou déjà utilisé.'); shake(); return; }

  const bindKey = 'bind_' + code;
  const bid = getBrowserId();
  const existing = localStorage.getItem(bindKey);

  if(existing && existing !== bid) {
    showErr('Ce code est déjà utilisé sur un autre appareil.');
    shake();
    sendTelegram(`⚠️ Tentative de réutilisation\nCode: <code>${code}</code>\nAppareil différent — accès refusé.`);
    return;
  }

  const isNew = !existing;
  if(isNew) {
    localStorage.setItem(bindKey, bid);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({code}));
    const now = new Date().toLocaleString('fr-FR', {timeZone:'Europe/Paris'});
    const label = TEST_CODES.has(code) ? '🧪 Code TEST utilisé' : '🔑 Nouveau code utilisé';
    sendTelegram(`${label} !\nCode: <code>${code}</code>\nDate: ${now}`);
  }

  launchApp(code, isNew, false);
}



function showErr(msg) { document.getElementById('login-error').textContent = msg; }
function shake() {
  const i = document.getElementById('code-input');
  i.style.borderColor = 'var(--c1)';
  setTimeout(()=>{ i.style.borderColor=''; }, 800);
}

let appBuilt = false;
function launchApp(code, isNew, isAdmin) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('hdr-user').textContent = isAdmin ? '👑 Admin' : (isNew ? '🔑 Accès activé' : '✅ Connecté');
  if(!appBuilt) { appBuilt=true; buildApp(); }
}

Milieu de [AB] : M((xA+xB)/2 ; (yA+yB)/2)`}

2. Résoudre le système formé par les équations de d et (AH)
3. Le point d'intersection est H.

Exemple : A(2;4), droite d : x+3y−4=0
  Vect. directeur de d : u⃗(−3;1)  →  vect. normal de (AH) : n⃗(−3;1)
  Éq. de (AH) : −3x + y + c = 0 → avec A : −6+4+c=0 → c=2

Indépendants : P(A∩B) = P(A)·P(B)  (en général ≠ 0)

Propriété : Si A et B indépendants → Ā et B sont indépendants.

Épreuves indépendantes répétées :

def dichotomie(f, a, b, eps):
    while b - a > eps:
        m = (a + b) / 2
        if f(a) * f(m) <= 0:
            b = m
        else:
            a = m
    return (a + b) / 2

# Algorithme de seuil
# "À partir de quel rang uₙ dépasse S ?"
def seuil(u0, S):
    u = u0
    n = 0
    while u <= S:
        u = 2 * u + 1   # exemple de récurrence
        n += 1
    return n

# Calcul de termes d'une suite récurrente

    u = u0
    for i in range(n):
        u = 2 * u + 1
    return u   # retourne uₙ`}

const cats = [...new Set(flashcards.map(f=>f.cat))];
const catColors = {
  "Second degré":"#e63946","Suites":"#f4a261","Dérivation":"#2a9d8f",

};
let activeCats = new Set(cats);
let known=[], unknown=[], cidx=0, flipped=false;

const filtersEl = document.getElementById('fc-filters');
cats.forEach(cat => {
  const b = document.createElement('button');
  b.className='fc-filter on';
  b.textContent=cat;
  b.style.color=catColors[cat]||'#aaa';
  b.style.borderColor=(catColors[cat]||'#aaa')+'55';
  b.onclick=()=>{
    if(activeCats.has(cat)){activeCats.delete(cat);b.classList.replace('on','off');}
    else{activeCats.add(cat);b.classList.replace('off','on');}
    resetCards();
  };
  filtersEl.appendChild(b);
});

function getFiltered(){return flashcards.filter(f=>activeCats.has(f.cat));}
function getRemaining(){const f=getFiltered();return f.filter((_,i)=>!known.includes(flashcards.indexOf(f[i]))&&!unknown.includes(flashcards.indexOf(f[i])));}
function updateStats(){const r=getRemaining();const tot=getFiltered().length;document.getElementById('fc-stats').textContent=`✅ ${known.length} sus  ·  ❌ ${unknown.length} à revoir  ·  🃏 ${r.length} / ${tot}`;}

function showCard(){
  const rem=getRemaining();
  if(!rem.length){
    document.getElementById('fc-card').style.display='none';
    document.getElementById('fc-actions').classList.remove('show');
    document.getElementById('fc-done').classList.add('show');
    document.getElementById('fc-done-sub').textContent=`${known.length} mémorisées · ${unknown.length} à retravailler`;
    return;
  }
  document.getElementById('fc-card').style.display='';
  document.getElementById('fc-done').classList.remove('show');
  const cur=rem[cidx%rem.length];
  const tot=getFiltered().length; const seen=known.length+unknown.length;
  document.getElementById('fc-prog-bar').style.width=Math.round(seen/tot*100)+'%';
  document.getElementById('fc-progress').textContent=`Carte ${cidx%rem.length+1} / ${rem.length}`;
  const card=document.getElementById('fc-card');
  card.classList.remove('flipped');
  document.getElementById('fc-side').textContent='Question';
  document.getElementById('fc-text').textContent=cur.q;
  document.getElementById('fc-cat').textContent=cur.cat;
  document.getElementById('fc-cat').style.color=catColors[cur.cat]||'#aaa';
  document.getElementById('fc-hint').style.display='';
  document.getElementById('fc-actions').classList.remove('show');
  flipped=false;
}
function flipCard(){
  if(flipped)return;const rem=getRemaining();if(!rem.length)return;
  const cur=rem[cidx%rem.length];flipped=true;
  document.getElementById('fc-card').classList.add('flipped');
  document.getElementById('fc-side').textContent='Réponse';
  document.getElementById('fc-text').textContent=cur.a;
  document.getElementById('fc-hint').style.display='none';
  document.getElementById('fc-actions').classList.add('show');
}
function nextCard(ok){
  const rem=getRemaining();const idx=flashcards.indexOf(rem[cidx%rem.length]);
  if(ok)known.push(idx);else unknown.push(idx);
  cidx++;updateStats();showCard();
}
function resetCards(){
  known=[];unknown=[];cidx=0;flipped=false;
  document.getElementById('fc-card').style.display='';
  document.getElementById('fc-done').classList.remove('show');
  updateStats();showCard();
}

// ══════════════════════════════════
// ══════════════════════════════════
// BUILD FLASHCARDS
// ══════════════════════════════════
const cats = [...new Set(flashcards.map(f=>f.cat))];
const catColors = {
  "Second degré":"#e63946","Suites":"#f4a261","Dérivation":"#2a9d8f",
  "Exponentielle":"#4895ef","Trigonométrie":"#9b5de5","Produit scalaire":"#f72585",
  "Géométrie":"#06d6a0","Probabilités":"#ffd166","Variables aléatoires":"#ef476f"
};
let activeCats = new Set(cats);
let known=[], unknown=[], cidx=0, flipped=false;

const filtersEl = document.getElementById('fc-filters');
cats.forEach(cat => {
  const b = document.createElement('button');
  b.className='fc-filter on';
  b.textContent=cat;
  b.style.color=catColors[cat]||'#aaa';
  b.style.borderColor=(catColors[cat]||'#aaa')+'55';
  b.onclick=()=>{
    if(activeCats.has(cat)){activeCats.delete(cat);b.classList.replace('on','off');}
    else{activeCats.add(cat);b.classList.replace('off','on');}
    resetCards();
  };
  filtersEl.appendChild(b);
});

function getFiltered(){return flashcards.filter(f=>activeCats.has(f.cat));}
function getRemaining(){const f=getFiltered();return f.filter((_,i)=>!known.includes(flashcards.indexOf(f[i]))&&!unknown.includes(flashcards.indexOf(f[i])));}
function updateStats(){const r=getRemaining();const tot=getFiltered().length;document.getElementById('fc-stats').textContent=`✅ ${known.length} sus  ·  ❌ ${unknown.length} à revoir  ·  🃏 ${r.length} / ${tot}`;}

function showCard(){
  const rem=getRemaining();
  if(!rem.length){
    document.getElementById('fc-card').style.display='none';
    document.getElementById('fc-actions').classList.remove('show');
    document.getElementById('fc-done').classList.add('show');
    document.getElementById('fc-done-sub').textContent=`${known.length} mémorisées · ${unknown.length} à retravailler`;
    return;
  }
  document.getElementById('fc-card').style.display='';
  document.getElementById('fc-done').classList.remove('show');
  const cur=rem[cidx%rem.length];
  const tot=getFiltered().length; const seen=known.length+unknown.length;
  document.getElementById('fc-prog-bar').style.width=Math.round(seen/tot*100)+'%';
  document.getElementById('fc-progress').textContent=`Carte ${cidx%rem.length+1} / ${rem.length}`;
  const card=document.getElementById('fc-card');
  card.classList.remove('flipped');
  document.getElementById('fc-side').textContent='Question';
  document.getElementById('fc-text').textContent=cur.q;
  document.getElementById('fc-cat').textContent=cur.cat;
  document.getElementById('fc-cat').style.color=catColors[cur.cat]||'#aaa';
  document.getElementById('fc-hint').style.display='';
  document.getElementById('fc-actions').classList.remove('show');
  flipped=false;
}
function flipCard(){
  if(flipped)return;const rem=getRemaining();if(!rem.length)return;
  const cur=rem[cidx%rem.length];flipped=true;
  document.getElementById('fc-card').classList.add('flipped');
  document.getElementById('fc-side').textContent='Réponse';
  document.getElementById('fc-text').textContent=cur.a;
  document.getElementById('fc-hint').style.display='none';
  document.getElementById('fc-actions').classList.add('show');
}
function nextCard(ok){
  const rem=getRemaining();const idx=flashcards.indexOf(rem[cidx%rem.length]);
  if(ok)known.push(idx);else unknown.push(idx);
  cidx++;updateStats();showCard();
}
function resetCards(){
  known=[];unknown=[];cidx=0;flipped=false;
  document.getElementById('fc-card').style.display='';
  document.getElementById('fc-done').classList.remove('show');
  updateStats();showCard();
}

const recapGrid=document.getElementById('recap-grid');
recapTables.forEach(t=>{
  const block=document.createElement('div');block.className='recap-block';
  const head=document.createElement('div');head.className='recap-head';
  head.style.cssText=`background:${t.color}18;border:1px solid ${t.color}44;color:${t.color}`;
  head.innerHTML=`<span>${t.title}</span><span style="font-size:11px;opacity:.5;font-weight:400">${t.rows.length} formules</span>`;
  const tbl=document.createElement('table');tbl.className='recap-tbl';
  tbl.style.border=`1px solid ${t.color}22`;
  const htr=document.createElement('tr');htr.className='hdr';
  t.cols.forEach(c=>{const td=document.createElement('td');td.textContent=c;htr.appendChild(td)});
  tbl.appendChild(htr);
  t.rows.forEach((row,ri)=>{
    const tr=document.createElement('tr');if(ri%2===1)tr.className='even';
    row.forEach(cell=>{const td=document.createElement('td');td.textContent=cell;tr.appendChild(td)});
    tbl.appendChild(tr);
  });
  block.appendChild(head);block.appendChild(tbl);recapGrid.appendChild(block);
});

  const rem=getRem();

  document.getElementById('fc-card').style.display='';document.getElementById('fc-done').classList.remove('show');

  document.getElementById('fc-progress').textContent=`Carte ${cidx%rem.length+1}/${rem.length}`;
  document.getElementById('fc-card').classList.remove('flipped');
  document.getElementById('fc-card-side').textContent='Question';
  document.getElementById('fc-card-text').textContent=cur.q;
  document.getElementById('fc-card-cat').textContent=cur.cat;
  document.getElementById('fc-card-hint').style.display='';
  document.getElementById('fc-actions').classList.remove('show');
  flipped=false;
}
function flipCard(){
  if(flipped)return;const rem=getRem();if(!rem.length)return;
  const cur=rem[cidx%rem.length];flipped=true;
  document.getElementById('fc-card').classList.add('flipped');
  document.getElementById('fc-card-side').textContent='Réponse';
  document.getElementById('fc-card-text').textContent=cur.a;
  document.getElementById('fc-card-hint').style.display='none';
  document.getElementById('fc-actions').classList.add('show');
}
function nextCard(ok){
  const rem=getRem();const idx=flashcards.indexOf(rem[cidx%rem.length]);
  if(ok)known.push(idx);else unknown.push(idx);cidx++;updateStats();showCard();
}
function resetCards(){known=[];unknown=[];cidx=0;flipped=false;document.getElementById('fc-card').style.display='';document.getElementById('fc-done').classList.remove('show');updateStats();showCard();}
